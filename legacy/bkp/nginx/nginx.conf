events {}

stream {
  upstream ldap_idm { server idm-primary:389 max_fails=3 fail_timeout=10s; server idm-replica:389 backup; }
  upstream ldaps_idm { server idm-primary:636 max_fails=3 fail_timeout=10s; server idm-replica:636 backup; }
  upstream kerberos_tcp { server idm-primary:88 max_fails=3 fail_timeout=10s; server idm-replica:88 backup; }
  upstream kpasswd_tcp { server idm-primary:464 max_fails=3 fail_timeout=10s; server idm-replica:464 backup; }
  upstream dns_tcp { server idm-primary:53 max_fails=3 fail_timeout=10s; server idm-replica:53 backup; }
  upstream dns_udp { server idm-primary:53 max_fails=3 fail_timeout=10s; server idm-replica:53 backup; }
  upstream kerberos_udp { server idm-primary:88 max_fails=3 fail_timeout=10s; server idm-replica:88 backup; }
  upstream kpasswd_udp { server idm-primary:464 max_fails=3 fail_timeout=10s; server idm-replica:464 backup; }

  server { listen 389; proxy_pass ldap_idm; }
  server { listen 636; proxy_pass ldaps_idm; }
  server { listen 88; proxy_pass kerberos_tcp; }
  server { listen 464; proxy_pass kpasswd_tcp; }
  server { listen 53; proxy_pass dns_tcp; }
  server { listen 53 udp; proxy_pass dns_udp; }
  server { listen 88 udp; proxy_pass kerberos_udp; }
  server { listen 464 udp; proxy_pass kpasswd_udp; }
}

http {
  upstream idm_http { server idm-primary:80 max_fails=3 fail_timeout=10s; server idm-replica:80 backup; }
  upstream idm_https { server idm-primary:443 max_fails=3 fail_timeout=10s; server idm-replica:443 backup; }

  server {
    listen 80;
    location / { proxy_pass http://idm_http; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  }
  server {
    listen 443 ssl;
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    location / { proxy_pass https://idm_https; proxy_ssl_verify off; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  }
}
