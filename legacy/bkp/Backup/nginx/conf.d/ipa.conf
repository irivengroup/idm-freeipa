server {
    listen 80;
    server_name ipa.lab.local localhost;
    return 301 https://ipa.lab.local$request_uri;
}

server {
    listen 443 ssl;
    server_name ipa.lab.local localhost;

    ssl_certificate /etc/nginx/certs/ipa-proxy.crt;
    ssl_certificate_key /etc/nginx/certs/ipa-proxy.key;

    client_max_body_size 64m;

    location / {
        proxy_pass https://ipa-server;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name ipa.lab.local;

        proxy_http_version 1.1;
        proxy_set_header Host ipa.lab.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host ipa.lab.local;
        proxy_set_header X-Forwarded-Port 443;

        proxy_redirect https://ipa.lab.local/ https://ipa.lab.local/;
        proxy_redirect http://ipa.lab.local/ https://ipa.lab.local/;
    }
}