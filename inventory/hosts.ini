[idm_primary]
idmprimarya ansible_host=192.168.1.51

[idm_replica]
idmreplicab ansible_host=192.168.1.52

[idm_loadbalancers]
idmloadbalancer1 ansible_host=192.168.1.53
idmloadbalancer2 ansible_host=192.168.1.54

[idm_admin]
idmadmin ansible_host=127.0.0.1 ansible_connection=local

# Future application servers.
# Uncomment and populate when needed.
[app_servers]
idmclient1a ansible_host=192.168.1.61
idmclient1b ansible_host=192.168.1.63

# Future database servers.
# Uncomment and populate when needed.
[db_servers]
idmclient2a ansible_host=192.168.1.62
idmclient2b ansible_host=192.168.1.72

# Future jump/bastion hosts if separated from idm_admin.
# Uncomment and populate when needed.
# [jump_hosts]
# jumphost1 ansible_host=192.168.1.40

[idm_clients:children]
app_servers
db_servers
idm_admin
idm_loadbalancers
#jump_hosts

[idm_servers:children]
idm_primary
idm_replica

[idm_all:children]
idm_servers
idm_clients

[idm_all:vars]
ansible_user=iriven
ansible_become=true
ansible_become_method=sudo
