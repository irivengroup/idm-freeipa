services:
  ipa-server:
    build:
      context: ./server
    container_name: ipa-server
    hostname: ${IPA_SERVER_HOSTNAME}
    domainname: ${DOMAIN}
    privileged: true
    env_file:
      - .env
    networks:
      idm_net:
        ipv4_address: ${IPA_SERVER_IP}
    ports:
      - "2220:22"
      - "8080:80"
      - "8443:443"
      - "389:389"
      - "636:636"
      - "88:88"
      - "88:88/udp"
      - "464:464"
      - "464:464/udp"
      - "5353:53"
      - "5353:53/udp"
    volumes:
      - ipa_data:/data
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    command: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/ipa-installed && systemctl is-active sshd >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20

  ipa-client1:
    build:
      context: ./client
    container_name: ipa-client1
    hostname: ${IPA_CLIENT_1_HOSTNAME}
    domainname: ${DOMAIN}
    privileged: true
    env_file:
      - .env
    networks:
      idm_net:
        ipv4_address: ${IPA_CLIENT_1_IP}
    dns:
      - ${IPA_SERVER_IP}
    ports:
      - "2221:22"
    depends_on:
      ipa-server:
        condition: service_started
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    command: ["/usr/local/bin/entrypoint.sh"]

  ipa-client2:
    build:
      context: ./client
    container_name: ipa-client2
    hostname: ${IPA_CLIENT_2_HOSTNAME}
    domainname: ${DOMAIN}
    privileged: true
    env_file:
      - .env
    networks:
      idm_net:
        ipv4_address: ${IPA_CLIENT_2_IP}
    dns:
      - ${IPA_SERVER_IP}
    ports:
      - "2222:22"
    depends_on:
      ipa-server:
        condition: service_started
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    command: ["/usr/local/bin/entrypoint.sh"]

networks:
  idm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

volumes:
  ipa_data:
