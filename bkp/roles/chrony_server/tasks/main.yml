---
- name: Install chrony
  ansible.builtin.package:
    name: chrony
    state: present

- name: Deploy Chrony server configuration
  ansible.builtin.template:
    src: chrony-server.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: restart chronyd

- name: Open NTP firewall service
  ansible.posix.firewalld:
    service: ntp
    permanent: true
    immediate: true
    state: enabled
  when: ansible_facts.services is not defined or true

- name: Ensure chronyd is running
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
