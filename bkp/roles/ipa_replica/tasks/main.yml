---
- name: Install FreeIPA replica packages
  ansible.builtin.package:
    name: "{{ idm_server_packages }}"
    state: present

- name: Open FreeIPA replica firewall services
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - freeipa-ldap
    - freeipa-ldaps
    - dns
    - kerberos
    - kpasswd
    - http
    - https
    - ntp

- name: Check whether FreeIPA replica is already installed
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_replica_default_conf

- name: Install FreeIPA replica
  ansible.builtin.shell: |
    set -euo pipefail
    forwarder_args=""
    {% for forwarder in idm_dns_forwarders %}
    forwarder_args="$forwarder_args --forwarder={{ forwarder }}"
    {% endfor %}
    ipa-replica-install -U \
      --domain={{ idm_domain }} \
      --realm={{ idm_realm }} \
      --server={{ idm_primary_fqdn }} \
      --hostname={{ idm_replica_fqdn }} \
      --setup-dns \
      --no-reverse \
      --no-ntp \
      --force-join \
      --principal={{ idm_admin_principal }} \
      --admin-password='{{ idm_admin_password }}' \
      $forwarder_args
  args:
    executable: /bin/bash
  no_log: true
  when: not ipa_replica_default_conf.stat.exists

- name: Ensure IPA replica services are started
  ansible.builtin.command: ipactl start
  register: ipactl_start
  changed_when: false
  failed_when: ipactl_start.rc not in [0]
