---
- name: Install FreeIPA primary packages
  ansible.builtin.package:
    name: "{{ idm_server_packages }}"
    state: present

- name: Open FreeIPA server firewall services
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - freeipa-ldap
    - freeipa-ldaps
    - dns
    - kerberos
    - kpasswd
    - http
    - https
    - ntp

- name: Check whether FreeIPA primary is already installed
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_primary_default_conf

- name: Install FreeIPA primary server packages
  ansible.builtin.shell: |
    set -euo pipefail
    forwarder_args=""
    {% for forwarder in idm_dns_forwarders %}
    forwarder_args="$forwarder_args --forwarder={{ forwarder }}"
    {% endfor %}
    ipa-server-install -U \
      --realm={{ idm_realm }} \
      --domain={{ idm_domain }} \
      --hostname={{ idm_primary_fqdn }} \
      --setup-dns \
      --no-reverse \
      --no-ntp \
      --ds-password='{{ idm_dm_password }}' \
      --admin-password='{{ idm_admin_password }}' \
      $forwarder_args
  args:
    executable: /bin/bash
  no_log: true
  when: not ipa_primary_default_conf.stat.exists

- name: Open FreeIPA firewall services
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - freeipa-ldap
    - freeipa-ldaps
    - dns
    - kerberos
    - kpasswd
    - http
    - https

- name: Ensure IPA services are started
  ansible.builtin.command: ipactl start
  register: ipactl_start
  changed_when: false
  failed_when: ipactl_start.rc not in [0]

- name: Ensure CA renewal master is primary
  ansible.builtin.shell: |
    set -o pipefail
    printf '%s\n' '{{ idm_admin_password }}' | kinit {{ idm_admin_principal }}
    ipa config-mod --ca-renewal-master-server={{ idm_primary_fqdn }} || true
  args:
    executable: /bin/bash
  no_log: true
  changed_when: false
