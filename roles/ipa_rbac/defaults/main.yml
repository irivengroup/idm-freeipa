---
# Disable only after hbactest and at least one breakglass user validation.
idm_rbac_disable_allow_all: false
idm_rbac_hbac_service: sshd

# Sudo command catalogs for limited roles.
idm_rbac_security_readonly_commands:
  - /usr/bin/journalctl
  - /usr/bin/systemctl
  - /usr/bin/cat
  - /usr/bin/less
  - /usr/bin/tail
  - /usr/bin/grep

idm_rbac_devops_commands:
  - /usr/bin/systemctl
  - /usr/bin/journalctl
  - /usr/bin/tail
  - /usr/bin/less

idm_rbac_db_commands:
  - /usr/bin/systemctl
  - /usr/bin/journalctl
  - /usr/bin/tail
  - /usr/bin/less

ipa_rbac_auth_method: auto
ipa_rbac_admin_principal: "{{ idm_admin_principal | default('admin') }}"
ipa_rbac_admin_password: "{{ idm_admin_password | default('') }}"
ipa_rbac_keytab_path: /etc/krb5.keytab
