---
- name: Obtain Kerberos ticket as IPA admin
  ansible.builtin.shell: |
    set -euo pipefail
    kdestroy >/dev/null 2>&1 || true
    printf '%s\n' '{{idm_admin_password}}' | kinit {{idm_admin_principal | default('admin')}}
  args:
    executable: /bin/bash
  no_log: true
  changed_when: false
  run_once: true

- name: Build IPA hostgroup membership from Ansible inventory
  ansible.builtin.set_fact:
    idm_rbac_hostgroup_members:
      linux-all: "{{ groups.get('idm_all', []) | unique | list }}"
      idm-servers: "{{ groups.get('idm_servers', []) | unique | list }}"
      app-servers: "{{ groups.get('app_servers', []) | unique | list }}"
      db-servers: "{{ groups.get('db_servers', []) | unique | list }}"
      jump-hosts: "{{ (groups.get('jump_hosts', []) + groups.get('idm_admin', [])) | unique | list }}"

- name: Ensure RBAC user groups exist
  ansible.builtin.shell: |
    set -euo pipefail
    if ipa group-show {{item.name}} >/dev/null 2>&1; then
      ipa group-mod {{item.name}} --desc="{{item.desc}}" >/dev/null
    else
      ipa group-add {{item.name}} --desc="{{item.desc}}" >/dev/null
      echo changed
    fi
  args:
    executable: /bin/bash
  loop: "{{idm_rbac_user_groups}}"
  register: ipa_rbac_user_group_result
  changed_when: "'changed' in ipa_rbac_user_group_result.stdout"
  run_once: true

- name: Ensure IPA hostgroups exist
  ansible.builtin.shell: |
    set -euo pipefail
    if ipa hostgroup-show {{item.name}} >/dev/null 2>&1; then
      ipa hostgroup-mod {{item.name}} --desc="{{item.desc}}" >/dev/null
    else
      ipa hostgroup-add {{item.name}} --desc="{{item.desc}}" >/dev/null
      echo changed
    fi
  args:
    executable: /bin/bash
  loop: "{{idm_rbac_hostgroups}}"
  register: ipa_rbac_hostgroup_result
  changed_when: "'changed' in ipa_rbac_hostgroup_result.stdout"
  run_once: true

- name: Ensure hosts are members of IPA hostgroups
  ansible.builtin.shell: |
    set -euo pipefail
    host_fqdn="{{item.1 if '.' in item.1 else item.1 ~ '.' ~ idm_domain}}"
    ipa host-show "$host_fqdn" >/dev/null 2>&1 || exit 0
    if ipa hostgroup-show {{item.0.key}} --all | grep -Fq "$host_fqdn"; then
      exit 0
    fi
    ipa hostgroup-add-member {{item.0.key}} --hosts="$host_fqdn" >/dev/null 2>&1 || true
    echo changed
  args:
    executable: /bin/bash
  loop: "{{idm_rbac_hostgroup_members | dict2items | subelements('value')}}"
  register: ipa_rbac_host_membership_result
  changed_when: "'changed' in ipa_rbac_host_membership_result.stdout"
  run_once: true

- name: Ensure sudo command objects exist for limited rules
  ansible.builtin.shell: |
    set -euo pipefail
    if ipa sudocmd-show {{item | quote}} >/dev/null 2>&1; then
      exit 0
    fi
    ipa sudocmd-add {{item | quote}} >/dev/null
    echo changed
  args:
    executable: /bin/bash
  loop: "{{(idm_rbac_security_readonly_commands + idm_rbac_devops_commands + idm_rbac_db_commands) | unique}}"
  register: ipa_rbac_sudocmd_result
  changed_when: "'changed' in ipa_rbac_sudocmd_result.stdout"
  run_once: true

- name: Ensure sudo rule for linux-admins exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-linux-admins >/dev/null 2>&1 || ipa sudorule-add sudo-linux-admins >/dev/null
    ipa sudorule-add-user sudo-linux-admins --groups=linux-admins >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-linux-admins --hostcat=all >/dev/null
    ipa sudorule-mod sudo-linux-admins --cmdcat=all >/dev/null
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure sudo rule for idm-admins exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-idm-admins >/dev/null 2>&1 || ipa sudorule-add sudo-idm-admins >/dev/null
    ipa sudorule-add-user sudo-idm-admins --groups=idm-admins >/dev/null 2>&1 || true
    ipa sudorule-add-host sudo-idm-admins --hostgroups=idm-servers >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-idm-admins --cmdcat=all >/dev/null
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure sudo rule for breakglass-admins exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-breakglass-admins >/dev/null 2>&1 || ipa sudorule-add sudo-breakglass-admins >/dev/null
    ipa sudorule-add-user sudo-breakglass-admins --groups=breakglass-admins >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-breakglass-admins --hostcat=all >/dev/null
    ipa sudorule-mod sudo-breakglass-admins --cmdcat=all >/dev/null
    ipa sudorule-add-option sudo-breakglass-admins --sudooption='!authenticate' >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure sudo rule for security-auditors exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-security-auditors >/dev/null 2>&1 || ipa sudorule-add sudo-security-auditors >/dev/null
    ipa sudorule-add-user sudo-security-auditors --groups=security-auditors >/dev/null 2>&1 || true
    ipa sudorule-add-host sudo-security-auditors --hostgroups=linux-all >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-security-auditors --cmdcat='' >/dev/null 2>&1 || true
    {% for cmd in idm_rbac_security_readonly_commands %}
    ipa sudorule-add-allow-command sudo-security-auditors --sudocmds={{cmd | quote}} >/dev/null 2>&1 || true
    {% endfor %}
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure sudo rule for devops-admins exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-devops-admins >/dev/null 2>&1 || ipa sudorule-add sudo-devops-admins >/dev/null
    ipa sudorule-add-user sudo-devops-admins --groups=devops-admins >/dev/null 2>&1 || true
    ipa sudorule-add-host sudo-devops-admins --hostgroups=app-servers >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-devops-admins --cmdcat='' >/dev/null 2>&1 || true
    {% for cmd in idm_rbac_devops_commands %}
    ipa sudorule-add-allow-command sudo-devops-admins --sudocmds={{cmd | quote}} >/dev/null 2>&1 || true
    {% endfor %}
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure sudo rule for db-admins exists
  ansible.builtin.shell: |
    set -euo pipefail
    ipa sudorule-show sudo-db-admins >/dev/null 2>&1 || ipa sudorule-add sudo-db-admins >/dev/null
    ipa sudorule-add-user sudo-db-admins --groups=db-admins >/dev/null 2>&1 || true
    ipa sudorule-add-host sudo-db-admins --hostgroups=db-servers >/dev/null 2>&1 || true
    ipa sudorule-mod sudo-db-admins --cmdcat='' >/dev/null 2>&1 || true
    {% for cmd in idm_rbac_db_commands %}
    ipa sudorule-add-allow-command sudo-db-admins --sudocmds={{cmd | quote}} >/dev/null 2>&1 || true
    {% endfor %}
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true

- name: Ensure HBAC rules exist
  ansible.builtin.shell: |
    set -euo pipefail
    ipa hbacrule-show {{item.rule}} >/dev/null 2>&1 || ipa hbacrule-add {{item.rule}} >/dev/null
    ipa hbacrule-add-user {{item.rule}} --groups={{item.group}} >/dev/null 2>&1 || true
    ipa hbacrule-add-host {{item.rule}} --hostgroups={{item.hostgroup}} >/dev/null 2>&1 || true
    ipa hbacrule-add-service {{item.rule}} --hbacsvcs={{idm_rbac_hbac_service}} >/dev/null 2>&1 || true
    ipa hbacrule-enable {{item.rule}} >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  loop:
    - {rule: "allow-linux-admins", group: "linux-admins", hostgroup: "linux-all"}
    - {rule: "allow-idm-admins", group: "idm-admins", hostgroup: "idm-servers"}
    - {rule: "allow-devops-admins", group: "devops-admins", hostgroup: "app-servers"}
    - {rule: "allow-db-admins", group: "db-admins", hostgroup: "db-servers"}
    - {rule: "allow-security-auditors", group: "security-auditors", hostgroup: "linux-all"}
    - {rule: "allow-breakglass-admins", group: "breakglass-admins", hostgroup: "linux-all"}
  changed_when: false
  run_once: true

- name: Attach idm-admins group to built-in FreeIPA roles when present
  ansible.builtin.shell: |
    ipa role-add-member {{item | quote}} --groups=idm-admins >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  loop:
    - User Administrator
    - Group Administrator
    - Host Administrator
    - DNS Administrator
    - Sudo Administrator
    - HBAC Administrator
    - Service Administrator
    - CA Administrator
  changed_when: false
  run_once: true

- name: Optionally disable default allow_all HBAC rule
  ansible.builtin.command: ipa hbacrule-disable allow_all
  when: idm_rbac_disable_allow_all | bool
  changed_when: false
  failed_when: false
  run_once: true

- name: Display RBAC validation summary
  ansible.builtin.shell: |
    set +e
    echo '== Groups =='
    ipa group-find --sizelimit=0 | egrep 'linux-admins|devops-admins|security-auditors|db-admins|idm-admins|breakglass-admins'
    echo '== Hostgroups =='
    ipa hostgroup-find --sizelimit=0 | egrep 'linux-all|idm-servers|app-servers|db-servers|jump-hosts'
    echo '== Sudo rules =='
    ipa sudorule-find --sizelimit=0 | egrep 'sudo-linux-admins|sudo-idm-admins|sudo-breakglass-admins|sudo-security-auditors|sudo-devops-admins|sudo-db-admins'
    echo '== HBAC rules =='
    ipa hbacrule-find --sizelimit=0 | egrep 'allow-linux-admins|allow-idm-admins|allow-devops-admins|allow-db-admins|allow-security-auditors|allow-breakglass-admins'
  args:
    executable: /bin/bash
  register: ipa_rbac_summary
  changed_when: false
  run_once: true

- name: Print RBAC validation summary
  ansible.builtin.debug:
    var: ipa_rbac_summary.stdout_lines
  run_once: true
