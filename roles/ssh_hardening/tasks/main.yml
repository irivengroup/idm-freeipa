---
- name: Ensure OpenSSH server is installed
  ansible.builtin.dnf:
    name: openssh-server
    state: present

- name: Ensure SSH drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure sshd is enabled and running
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started

- name: Deploy SSH hardening drop-in configuration
  ansible.builtin.template:
    src: 99-idm-hardening.conf.j2
    dest: "{{ ssh_hardening_dropin_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart sshd

- name: Validate sshd configuration
  ansible.builtin.command: sshd -t
  changed_when: false

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
