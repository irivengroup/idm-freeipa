---
- name: Restart systemd-journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  failed_when: false

- name: Reload audit rules
  ansible.builtin.command: augenrules --load
  changed_when: true
  failed_when: false
