---
audit_baseline_journald_conf_dir: /etc/systemd/journald.conf.d
audit_baseline_journald_conf_file: /etc/systemd/journald.conf.d/99-idm-audit.conf
audit_baseline_journal_storage: persistent
audit_baseline_journal_compress: "yes"
audit_baseline_journal_system_max_use: 1G
audit_baseline_journal_runtime_max_use: 256M
audit_baseline_journal_max_retention_sec: 1month

audit_baseline_sudoers_file: /etc/sudoers.d/99-idm-audit
audit_baseline_sudo_logfile: /var/log/sudo.log
audit_baseline_sudo_iolog_dir: /var/log/sudo-io
audit_baseline_sudo_use_pty: true
audit_baseline_sudo_log_input: true
audit_baseline_sudo_log_output: true

audit_baseline_rsyslog_conf_file: /etc/rsyslog.d/99-idm-audit.conf
audit_baseline_rsyslog_forwarding_enabled: false
audit_baseline_rsyslog_remote_host: ""
audit_baseline_rsyslog_remote_port: 514
audit_baseline_rsyslog_remote_protocol: tcp

audit_baseline_auditd_enabled: true
audit_baseline_auditd_rules_file: /etc/audit/rules.d/99-idm-audit.rules
