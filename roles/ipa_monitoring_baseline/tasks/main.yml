---
- name: Ensure monitoring directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ idm_monitoring_log_dir }}"
    - "{{ idm_monitoring_scripts_dir }}"

- name: Deploy IDM monitoring check script
  ansible.builtin.template:
    src: idm-monitoring-check.sh.j2
    dest: "{{ idm_monitoring_scripts_dir }}/idm-monitoring-check.sh"
    owner: root
    group: root
    mode: "0750"

- name: Deploy IDM monitoring systemd service
  ansible.builtin.template:
    src: idm-monitoring-check.service.j2
    dest: /etc/systemd/system/idm-monitoring-check.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy IDM monitoring systemd timer
  ansible.builtin.template:
    src: idm-monitoring-check.timer.j2
    dest: /etc/systemd/system/idm-monitoring-check.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start IDM monitoring timer
  ansible.builtin.systemd:
    name: idm-monitoring-check.timer
    enabled: true
    state: started

- name: Validate monitoring script syntax
  ansible.builtin.command: "bash -n {{ idm_monitoring_scripts_dir }}/idm-monitoring-check.sh"
  changed_when: false

- name: Show monitoring timer status
  ansible.builtin.command: systemctl list-timers idm-monitoring-check.timer --no-pager
  changed_when: false
  register: idm_monitoring_timer_status

- name: Display monitoring timer status
  ansible.builtin.debug:
    var: idm_monitoring_timer_status.stdout_lines
