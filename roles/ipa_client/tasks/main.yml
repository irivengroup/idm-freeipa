---
- name: Install FreeIPA client packages
  ansible.builtin.package:
    name: "{{ idm_client_packages }}"
    state: present

- name: Configure /etc/hosts for IPA servers
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} IDM LAB HOSTS"
    block: |
      {{ idm_primary_ip }} {{ idm_primary_fqdn }} {{ idm_primary_host | default(idm_primary_hostname) }}
      {{ idm_replica_ip }} {{ idm_replica_fqdn }} {{ idm_replica_host | default(idm_replica_hostname) }}
    owner: root
    group: root
    mode: "0644"

- name: Build IPA DNS server list from inventory
  ansible.builtin.set_fact:
    idm_client_dns_servers_effective: >-
      {{
        groups.get('idm_servers', [])
        | map('extract', hostvars, 'ansible_host')
        | select('defined')
        | list
        | unique
      }}

- name: Fallback to static IPA DNS server list when inventory extraction is empty
  ansible.builtin.set_fact:
    idm_client_dns_servers_effective:
      - "{{ idm_primary_ip }}"
      - "{{ idm_replica_ip }}"
  when: idm_client_dns_servers_effective | length == 0

- name: Detect default IPv4 interface
  ansible.builtin.shell: |
    set -o pipefail
    ip -o -4 route show to default | awk '{print $5; exit}'
  args:
    executable: /bin/bash
  register: idm_client_default_iface
  changed_when: false

- name: Detect active NetworkManager connection for default interface
  ansible.builtin.shell: |
    set -o pipefail
    nmcli -t -f NAME,DEVICE con show --active | awk -F: -v dev="{{ idm_client_default_iface.stdout }}" '$2 == dev {print $1; exit}'
  args:
    executable: /bin/bash
  register: idm_client_nm_connection
  changed_when: false

- name: Fail when no active NetworkManager connection is detected
  ansible.builtin.fail:
    msg: >-
      Unable to detect the active NetworkManager connection for interface
      {{ idm_client_default_iface.stdout | default('UNKNOWN') }}.
      Ensure NetworkManager manages the client network interface.
  when: idm_client_nm_connection.stdout | length == 0

- name: Set NetworkManager connection and desired DNS facts
  ansible.builtin.set_fact:
    cnx_name: "{{ idm_client_nm_connection.stdout }}"
    idm_client_dns_servers_nm: "{{ idm_client_dns_servers_effective | join(' ') }}"

- name: Read current NetworkManager DNS configuration
  ansible.builtin.command: >
    nmcli -g ipv4.dns,ipv4.ignore-auto-dns con show {{ cnx_name }}
  register: idm_client_current_nm_dns
  changed_when: false

- name: Configure DNS to use IPA servers
  ansible.builtin.command: >
    nmcli con mod {{ cnx_name }}
    ipv4.dns "{{ idm_client_dns_servers_nm }}"
    ipv4.ignore-auto-dns yes
  register: idm_client_nm_dns_update
  changed_when: true
  when: >-
    idm_client_dns_servers_effective | join(',') not in idm_client_current_nm_dns.stdout
    or 'yes' not in idm_client_current_nm_dns.stdout

- name: Bring connection up
  ansible.builtin.command: nmcli con up {{ cnx_name }}
  changed_when: true
  when: idm_client_nm_dns_update is changed

- name: Check whether IPA client is already configured
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_client_default_conf

- name: Enroll client into FreeIPA
  ansible.builtin.command:
    argv:
      - ipa-client-install
      - -U
      - --domain={{ idm_domain }}
      - --realm={{ idm_realm }}
      - --server={{ idm_lb_vip_fqdn }}
      - --mkhomedir
      - --force-join
      - --principal={{ idm_admin_principal }}
      - --password={{ idm_admin_password }}
  no_log: true
  when: not ipa_client_default_conf.stat.exists

- name: Ensure SSSD is enabled and running
  ansible.builtin.systemd:
    name: sssd
    enabled: true
    state: started
