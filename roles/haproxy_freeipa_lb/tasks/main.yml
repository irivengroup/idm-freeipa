---
- name: Install load balancer packages
  ansible.builtin.package:
    name: "{{ idm_lb_packages }}"
    state: present

- name: Ensure HAProxy runtime directory exists
  ansible.builtin.file:
    path: /run/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: '0755'

- name: Deploy HAProxy FreeIPA configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    backup: true
    validate: 'haproxy -c -f %s'
  notify: restart haproxy

- name: Deploy Keepalived configuration
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: '0600'
    backup: true
  notify: restart keepalived

- name: Open HAProxy and Keepalived firewall services
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - 80/tcp
    - 443/tcp
    - 389/tcp
    - 636/tcp
    - 88/tcp
    - 464/tcp
    - "{{ idm_lb_stats_port }}/tcp"

- name: Ensure services are enabled and running
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - haproxy
    - keepalived
