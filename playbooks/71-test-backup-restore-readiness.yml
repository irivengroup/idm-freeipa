---
- name: Validate FreeIPA backup and restore readiness
  hosts: idm_primary
  become: true
  gather_facts: false

  tasks:
    - name: Check IPA backup directory
      ansible.builtin.stat:
        path: "{{ ipa_backup_dir | default('/var/backups/ipa') }}"
      register: ipa_restore_readiness_backup_dir

    - name: Assert IPA backup directory exists
      ansible.builtin.assert:
        that:
          - ipa_restore_readiness_backup_dir.stat.exists
          - ipa_restore_readiness_backup_dir.stat.isdir

    - name: Find IPA backups
      ansible.builtin.find:
        paths: "{{ ipa_backup_dir | default('/var/backups/ipa') }}"
        file_type: directory
        patterns: "ipa-full-*"
      register: ipa_restore_readiness_backups

    - name: Assert at least one IPA backup exists
      ansible.builtin.assert:
        that:
          - ipa_restore_readiness_backups.matched | int > 0
        fail_msg: "No IPA backup found. Run systemctl start ipa-backup-iriven.service first."

    - name: Find backup manifests
      ansible.builtin.find:
        paths: "{{ ipa_backup_manifest_dir | default('/var/backups/ipa/manifests') }}"
        file_type: file
        patterns: "*.manifest"
      register: ipa_restore_readiness_manifests

    - name: Assert at least one manifest exists
      ansible.builtin.assert:
        that:
          - ipa_restore_readiness_manifests.matched | int > 0

    - name: Validate required restore readiness files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ ipa_backup_restore_readiness_required_files | default(['/etc/ipa/default.conf', '/etc/krb5.conf']) }}"
      register: ipa_restore_readiness_required_files

    - name: Assert required restore readiness files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Required restore readiness file missing: {{ item.item }}"
      loop: "{{ ipa_restore_readiness_required_files.results }}"
